    <style>
        /* ----- Same variables & base styles as full site ----- */
        :root {
            --color-primary: #0A2E5C;
            --color-primary-dark: #061d3a;
            --color-accent: #F5A623;
            --color-accent-hover: #e69510;
            --color-white: #FFFFFF;
            --color-gray-600: #6c757d;
            --font-heading: 'Poppins', sans-serif;
            --font-body: 'Inter', sans-serif;
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            font-family: var(--font-body);
            color: var(--color-white);
            background-color: var(--color-primary);
        }

        /* ----- Full-page hero with overlay ----- */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?w=1920&h=1080&fit=crop&auto=format&q=80') center center / cover no-repeat;
            background-attachment: fixed;
            text-align: center;
            overflow: hidden;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg,
                    rgba(10, 46, 92, 0.92) 0%,
                    rgba(10, 46, 92, 0.70) 50%,
                    rgba(10, 46, 92, 0.50) 100%);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 700px;
            padding: 40px 24px;
            width: 100%;
        }

        /* ===== LOGO IMAGE STYLES ===== */
        .brand-logo {
            display: block;
            max-width: 280px;
            width: 100%;
            height: auto;
            margin: 0 auto 1.8rem;
            border-radius: 50%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.5));
        }

        /* ----- Main headline ----- */
        h1 {
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: clamp(2.4rem, 6vw, 3.8rem);
            color: var(--color-white);
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .sub-text {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.85);
            max-width: 500px;
            margin: 0 auto 2rem;
            line-height: 1.6;
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.2);
        }

        /* ----- Email subscription form ----- */
        .subscribe-form {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            max-width: 480px;
            margin: 0 auto 1.5rem;
        }
        .subscribe-form input {
            flex: 1 1 220px;
            padding: 14px 20px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-family: var(--font-body);
            background: rgba(255, 255, 255, 0.9);
            color: var(--color-primary);
            outline: none;
            box-shadow: var(--shadow-lg);
            transition: 0.2s;
        }
        .subscribe-form input:focus {
            background: #fff;
            box-shadow: 0 0 0 3px var(--color-accent);
        }
        .subscribe-form .btn {
            background: var(--color-accent);
            border: none;
            color: var(--color-primary-dark);
            font-weight: 700;
            font-size: 1rem;
            padding: 14px 32px;
            border-radius: 50px;
            cursor: pointer;
            font-family: var(--font-body);
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: var(--shadow-lg);
        }
        .subscribe-form .btn:hover {
            background: var(--color-accent-hover);
            transform: scale(1.02);
        }

        /* ----- Social / contact links ----- */
        .contact-links {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }
        .contact-links a {
            color: rgba(255, 255, 255, 0.75);
            font-size: 1.2rem;
            text-decoration: none;
            transition: 0.2s;
            padding: 6px 14px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .contact-links a:hover {
            color: var(--color-accent);
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--color-accent);
        }
        .contact-links i {
            color: var(--color-accent);
        }

        /* ----- Small footer note ----- */
        .footer-note {
            margin-top: 2.5rem;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.5px;
        }

        /* ----- Responsive tweaks ----- */
        @media (max-width: 480px) {
            .brand-logo {
                max-width: 200px;
            }
            .subscribe-form {
                flex-direction: column;
                align-items: stretch;
            }
            .subscribe-form input,
            .subscribe-form .btn {
                width: 100%;
                justify-content: center;
            }
            .contact-links a {
                font-size: 1rem;
                padding: 4px 12px;
            }
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
